            animation: slideUp 0.3s ease-out;
            word-wrap: break-word;

            flex: 1; padding: 10px 15px; border-radius: 25px; border: 1px solid var(--glass-border);

        function renderFeedbacks() {
            const list = document.getElementById('feedback-list');
            list.innerHTML = "";
            feedbacks.slice(-15).forEach(item => {
                const div = document.createElement('div');
                div.className = 'feedback-item';
                div.innerHTML = `<span class="feedback-user">${item.user}</span>${item.msg}`;
                list.appendChild(div);
            });
            list.scrollTop = list.scrollHeight;
        }

            const input = document.getElementById('feedback-input');

        let questions = []; // Akan diisi 30 soal acak
        let currentIndex = 0;
        let userAnswers = [];

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startQuiz() {
            // Ambil 30 soal acak dari bank soal
            questions = shuffle([...allQuestions]).slice(0, 30);
            userAnswers = new Array(questions.length).fill(null);
            currentIndex = 0;

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('bgm').play().catch(() => {});
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= questions.length) {
                return showResult();
            }

            const qData = questions[currentIndex];
            document.getElementById('question-number').innerText = `Pertanyaan ${currentIndex + 1}/30`;
            document.getElementById('question-display').innerText = qData.q;
            
            const optionsDiv = document.getElementById('options-display');
            optionsDiv.innerHTML = "";

            const shuffledOptions = shuffle([...qData.options]);
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, qData.a);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            const correctOverlay = document.getElementById('surprise-overlay');
            const wrongOverlay = document.getElementById('fail-overlay');
            const sndCorrect = document.getElementById('snd-correct');
            const sndWrong = document.getElementById('snd-wrong');

            userAnswers[currentIndex] = selected;

            if (selected === correct) {
                sndCorrect.currentTime = 0;
                sndCorrect.play();
                correctOverlay.style.display = 'flex';
                setTimeout(() => { correctOverlay.style.display = 'none'; }, 1500);
            } else {
                sndWrong.currentTime = 0;
                sndWrong.play();
                wrongOverlay.style.display = 'flex';
                setTimeout(() => { wrongOverlay.style.display = 'none'; }, 1500);
            }

            currentIndex++;
            setTimeout(showQuestion, 1700);
        }

        function showResult() {
            let score = 0;
            userAnswers.forEach((ans, index) => { if(ans === questions[index].a) score++; });
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Skor Kamu: ${score} / 30`;
        }

        window.onload = renderFeedbacks;
    </script>
